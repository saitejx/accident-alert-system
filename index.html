<!DOCTYPE html>
<html>
<head>

<title>Accident Alert</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

</head>

<body>

<div class="card">

<h1>🚨 Accident Detection & Alert System</h1>

<div id="map"></div>


<h2>Accident Severity</h2>

<div class="buttons">

<button class="minor" onclick="startCountdown(1)">Minor</button>
<button class="moderate" onclick="startCountdown(2)">Moderate</button>
<button class="severe" onclick="startCountdown(3)">Severe</button>

</div>

<p id="countdownText"></p>


<h2>Emergency Contacts</h2>

<div id="emailSection">

<input id="email1" placeholder="Email contact 1">
<input id="email2" placeholder="Email contact 2">
<input id="email3" placeholder="Email contact 3">

<button class="saveBtn" onclick="saveEmails()">Save Contacts</button>

</div>

<button id="editBtn" onclick="editEmails()" style="display:none">Edit Contacts</button>

</div>

<script src="script.js"></script>

</body>
</html>
