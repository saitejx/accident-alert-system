<!DOCTYPE html>

<html>

<head>

<title>Accident Detection & Alert System</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="app-container">

<h1 class="title">🚨 Accident Detection & Alert System</h1>

<div id="map"></div>

<div class="section">

<h2>Accident Severity</h2>

<div class="buttons">

<button class="btn minor" onclick="startCountdown(1)">
🟡 Minor Accident
</button>

<button class="btn moderate" onclick="startCountdown(2)">
🟠 Moderate Accident
</button>

<button class="btn severe" onclick="startCountdown(3)">
🔴 Severe Accident
</button>

</div>

</div>

<h3 id="countdownText"></h3>

<button id="cancelBtn" onclick="cancelAlert()" style="display:none;">
Cancel Alert
</button>

<div class="section">

<h2>Emergency Contacts</h2>

<div id="contactForm">

<input type="email" id="email1" placeholder="Parent Email"><br><br> <input type="email" id="email2" placeholder="Friend Email"><br><br> <input type="email" id="email3" placeholder="Relative Email"><br><br>

<button onclick="saveContacts()" class="btn moderate">
Save Contacts
</button>

</div>

<div id="savedContacts" style="display:none;">

<p>✅ Contacts Saved</p>

<button onclick="editContacts()" class="btn minor">
Edit Contacts
</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
